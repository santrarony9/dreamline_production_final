<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/logo.png" type="image/png">
    <title>Journal Details | Dreamline Production</title>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=AW-17805539120"></script>
    <script>
        window.dataLayer = window.dataLayer || [];

        function gtag() {
            dataLayer.push(arguments);
        }
        gtag('js', new Date());

        gtag('config', 'AW-17805539120');
    </script>

    <script type="module" src="/src/main.js"></script>
    <script type="module" src="/src/journal-loader.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;600;900&family=Instrument+Sans:wght@400;600&display=swap"
        rel="stylesheet">
    <style>
        .font-heading {
            font-family: 'Unbounded', sans-serif;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: var(--black);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 10px;
        }

        /* Floating Nav */
        .nav-glass {
            background: rgba(10, 10, 10, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .interactive:hover {
            color: var(--gold);
        }

        /* Content Typography */
        .journal-content h3 {
            font-family: 'Unbounded', sans-serif;
            font-size: 1.5rem;
            color: var(--gold);
            margin-top: 2rem;
            margin-bottom: 1rem;
        }

        .journal-content p {
            margin-bottom: 1.5rem;
            line-height: 1.8;
            color: #d4d4d8;
        }
    </style>
</head>

<body>
    <!-- Standard Navigation -->
    <nav
        class="fixed top-6 left-1/2 -translate-x-1/2 z-50 w-[90%] max-w-5xl rounded-full nav-glass py-4 px-8 flex justify-between items-center">
        <div class="font-heading font-black text-lg tracking-tighter">
            <a href="index.html" class="interactive flex items-center gap-2">
                <img src="/logo.png" alt="Dreamline Logo" class="h-8 w-auto filter invert grayscale">
            </a>
        </div>
        <div class="hidden md:flex items-center gap-10 text-[11px] font-bold uppercase tracking-widest text-gray-400">
            <a href="index.html" class="hover:text-white transition-colors interactive">HOME</a>
            <a href="about.html" class="hover:text-white transition-colors interactive">HISTORY</a>
            <a href="luxury.html" class="hover:text-white transition-colors interactive">LUXURY WEDDINGS </a>
            <a href="commercial.html" class="hover:text-[#c5a059] transition-colors interactive">COMMERCIAL</a>
            <a href="index.html#footer" class="hover:text-white transition-colors interactive">CONTACT</a>
        </div>
        <div class="flex items-center gap-2 md:gap-4">
            <button class="theme-toggle interactive p-2 rounded-full hover:bg-white/10 transition-colors"
                aria-label="Toggle Theme">
                <svg class="sun-icon hidden w-4 h-4 text-gold-500" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                </svg>
                <svg class="moon-icon w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                </svg>
            </button>
        </div>
    </nav>

    <main class="min-h-screen pt-32 pb-20">
        <!-- Hero Image -->
        <div class="container mx-auto px-6 mb-12">
            <div class="aspect-video w-full rounded-3xl overflow-hidden border border-white/10 relative">
                <img id="post-image" src="" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-black/40"></div>
                <div class="absolute bottom-10 left-10 right-10">
                    <div class="flex gap-4 mb-4 text-[10px] uppercase font-bold tracking-widest text-[#c5a059]">
                        <span id="post-date"></span>
                        <span class="w-[1px] h-3 bg-white/50"></span>
                        <span id="post-category"></span>
                    </div>
                    <h1 id="post-title"
                        class="font-heading text-3xl md:text-5xl font-black uppercase leading-tight max-w-4xl"></h1>
                </div>
            </div>
        </div>

        <!-- Content -->
        <article class="container mx-auto px-6 max-w-4xl">
            <div id="post-content" class="journal-content text-lg font-light text-gray-300">
                <!-- Content injected here -->
            </div>

        </article>

    </main>

    <!-- Footer -->
    <footer class="py-10 border-t border-white/5 text-center text-[10px] text-gray-600 uppercase tracking-widest">
        &copy; 2025 Dreamline Production
    </footer>
</body>

</html>
